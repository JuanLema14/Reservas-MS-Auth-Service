# ================================================================
# Pipeline CI - MS-AUTH-SERVICE
# Caso 15 - Plataforma de Reservas de Servicios
# Sprint 2: HU-01, HU-02, HU-03
# ================================================================

name: CI - MS-Auth-Service

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-auth:
    name: Pruebas Unitarias y Cobertura
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compilar MS-Auth-Service
        run: mvn compile --no-transfer-progress

      - name: Ejecutar pruebas unitarias + reporte JaCoCo
        run: mvn test --no-transfer-progress
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Validar Quality Gate de cobertura (>= 40%)
        run: mvn verify --no-transfer-progress -DskipTests
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Publicar reporte JaCoCo
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report-auth
          path: target/site/jacoco/
          retention-days: 30

      - name: Análisis SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn sonar:sonar
          -Dsonar.projectKey=JuanLema14_Reservas-MS-Auth-Service
          -Dsonar.organization=juanlema14
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

      - name: Resumen en GitHub
        if: always()
        run: |
          echo "## MS-Auth-Service - Sprint 2" >> $GITHUB_STEP_SUMMARY
          echo "| HU | Descripción | Estado |" >> $GITHUB_STEP_SUMMARY
          echo "|----|-------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| HU-01 | Registro de usuario cliente | OK |" >> $GITHUB_STEP_SUMMARY
          echo "| HU-02 | Registro de proveedor de servicios | OK |" >> $GITHUB_STEP_SUMMARY
          echo "| HU-03 | Inicio de sesión | OK |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Reporte JaCoCo disponible en la pestaña **Artifacts**." >> $GITHUB_STEP_SUMMARY