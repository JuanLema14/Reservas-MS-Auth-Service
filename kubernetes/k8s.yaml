# ========================================
# MS-AUTH-SERVICE - Kubernetes Configuration
# ========================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
  namespace: default
data:
  SPRING_PROFILE: "prod"
  SERVER_PORT: "8081"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  labels:
    app: auth-service
spec:
  replicas: 4
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: isabedoya/reservas-ms-auth-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: auth-service-config
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: JWT_SECRET
            - name: JWT_EXPIRATION
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: JWT_EXPIRATION
            - name: EMAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: EMAIL_USERNAME
            - name: EMAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: EMAIL_PASSWORD
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: DB_URL
            - name: FRONTEND_URL
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: FRONTEND_URL
            - name: SERVICES_CATALOG_URL
              valueFrom:
                secretKeyRef:
                  name: auth-service-secrets
                  key: SERVICES_CATALOG_URL
          # Probes disabled - actuator health is secured by Spring Security
          # livenessProbe:
          #   httpGet:
          #     path: /actuator/health
          #     port: 8081
          #   initialDelaySeconds: 60
          #   periodSeconds: 10
          # readinessProbe:
          #   httpGet:
          #     path: /actuator/health
          #     port: 8081
          #   initialDelaySeconds: 30
          #   periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  selector:
    app: auth-service
  ports:
    - port: 8081
      targetPort: 8081
  type: ClusterIP