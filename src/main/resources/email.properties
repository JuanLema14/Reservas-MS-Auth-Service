# Email Configuration
# SMTP server settings for sending emails

# Email host (Gmail SMTP)
email.host=${EMAIL_HOST:smtp.gmail.com}

# Email port (TLS)
email.port=${EMAIL_PORT:587}

# Email username (from environment variable)
email.username=${EMAIL_USERNAME}

# Email password (App Password from environment variable)
email.password=${EMAIL_PASSWORD}

# SMTP authentication settings
email.smtp.auth=${EMAIL_SMTP_AUTH:true}
email.smtp.starttls.enable=${EMAIL_SMTP_STARTTLS_ENABLE:true}
email.smtp.starttls.required=${EMAIL_SMTP_STARTTLS_REQUIRED:true}

# Frontend and Platform Configuration
frontend.url=${FRONTEND_URL:http://localhost:3000}
platform.name=${PLATFORM_NAME:Plataforma de Reservas}
