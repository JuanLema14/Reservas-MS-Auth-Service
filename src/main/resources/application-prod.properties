# Server - Render asigna puerto dinï¿½micamente vï¿½a variable $PORT
server.port=${PORT:8081}

# Database - Supabase (producciÃ³n - variables inyectadas)
# URL limpia, credenciales separadas
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate - producciÃ³n (NO modificar esquema automÃ¡ticamente)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Connection Pool - optimizado para producciÃ³n en Supabase
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
# SSL ya estÃ¡ configurado en application.properties comÃºn

# Logging - solo errores en producciÃ³n
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.com.codefactory.reservasmsauthservice=INFO

# Transaction
spring.transaction.default-timeout=30
spring.transaction.rollback-on-commit-failure=true

# Actuator - health, prometheus for observability (Grafana/Prometheus)
management.endpoints.web.exposure.include=health,prometheus,metrics,info
management.endpoint.health.show-details=always
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

# Security headers
server.forward-headers-strategy=framework

# Feign Client URLs - URLs de otros microservicios en producciÃ³n
services.catalog.url=${SERVICES_CATALOG_URL:https://reservas-ms-catalog-service.onrender.com}

# Feign Client Timeout - para manejar cold start de Render
feign.client.config.default.connectTimeout=60000
feign.client.config.default.readTimeout=60000

# Frontend URL para producciÃ³n
frontend.url=${FRONTEND_URL:https://tu-frontend.vercel.app}

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true