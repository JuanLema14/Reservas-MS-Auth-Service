spring.application.name=Reservas-MS-Auth-Service
spring.config.import=optional:file:.env,optional:classpath:email.properties
spring.profiles.active=${SPRING_PROFILE:dev}

# Content Negotiation
spring.mvc.contentnegotiation.favor-path-extension=false
spring.mvc.contentnegotiation.favor-parameter=false
spring.mvc.contentnegotiation.media-types.json=application/json

# Feign Client URLs
services.catalog.url=${SERVICES_CATALOG_URL:http://localhost:8082}

# JWT Configuration
jwt.secret=${JWT_SECRET:default-secret-key-change-in-prod}
jwt.access-expiration=${JWT_ACCESS_EXPIRATION:900000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# Login Security Configuration
login.max-attempts=${LOGIN_MAX_ATTEMPTS:5}
login.lockout-duration-hours=${LOGIN_LOCKOUT_DURATION_HOURS:24}

# Password Reset Configuration
password.reset.token.expiration.hours=${PASSWORD_RESET_TOKEN_EXPIRATION_HOURS:24}

# Frontend URL
frontend.url=${FRONTEND_URL:http://localhost:3000}

# Platform name for emails
platform.name=Plataforma de Reservas

# Logging base
logging.level.com.codefactory.reservasmsauthservice=DEBUG
logging.level.org.springframework.web=INFO

# Actuator & Prometheus
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
management.endpoint.health.show-details=always