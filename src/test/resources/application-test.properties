# ======================
# TEST PROFILE - H2 In-Memory Database
# ======================
spring.profile=test
spring.config.import=optional:file:.env

# H2 Database Configuration with PostgreSQL mode
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.type_cast=true

# JWT Configuration (test values)
jwt.secret=test-secret-key-for-testing-only-do-not-use-in-prod
jwt.expiration=3600000

# Email Configuration (test values - not used in actual email sending)
email.host=smtp.gmail.com
email.port=587
email.username=test@example.com
email.password=test-password
email.smtp.auth=true
email.smtp.starttls.enable=true
email.smtp.starttls.required=true

# Frontend URL para pruebas
frontend.url=http://localhost:3000

# Logging
logging.level.com.codefactory.reservasmsauthservice=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

